<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Taxonomy verifier</title>
<style>
  :root{--bg:#0f1320;--panel:#171c2e;--line:#2a3350;--txt:#e6e9f2;--dim:#9aa3bd;--accent:#4f8cff}
  *{box-sizing:border-box} body{margin:0;font:13px/1.4 system-ui,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--txt)}
  header{display:flex;gap:14px;align-items:center;padding:10px 16px;border-bottom:1px solid var(--line);background:var(--panel)}
  header h1{font-size:15px;margin:0}
  .grid{display:grid;grid-template-columns:430px 1fr;height:calc(100vh - 49px)}
  .col{overflow:auto;padding:12px} .col.left{border-right:1px solid var(--line)}
  input,select{background:#10182b;color:var(--txt);border:1px solid var(--line);border-radius:6px;padding:6px 8px}
  .filters{display:flex;gap:6px;margin-bottom:10px}
  .group{font-size:13px;font-weight:700;margin:14px 0 4px;color:var(--txt)}
  .type{cursor:pointer;color:var(--dim);font-size:12px;margin:6px 0 2px;user-select:none}
  .type:hover{color:var(--txt)} .type .ct{color:#667}
  .kids{margin-left:12px;border-left:1px solid var(--line);padding-left:8px}
  .item{padding:5px 8px;border-radius:6px;cursor:pointer;border:1px solid transparent;display:flex;gap:8px;align-items:baseline}
  .item:hover{background:#1d2540} .item.sel{background:#23304f;border-color:var(--accent)}
  .item .nm{flex:1} .item .pg{color:var(--dim);font-size:11px;white-space:nowrap}
  .ty{display:inline-block;font-size:10px;padding:1px 6px;border-radius:8px;background:#2a3350;color:#bcd;margin-top:2px}
  .stage{position:relative;display:inline-block;max-width:100%;border:1px solid var(--line);border-radius:6px}
  .stage img{display:block;max-width:100%}
  .hl{position:absolute;border:2px solid #ffcc33;background:rgba(255,204,51,.22);box-shadow:0 0 0 9999px rgba(8,10,18,.5)}
  .cap{color:var(--dim);margin:6px 0}
  .big{font-size:16px;color:var(--txt)}
  .item.notprod .nm{color:var(--dim);text-decoration:line-through}
  .flag{background:#5a3030;color:#ffb4b4}
  .review{margin:10px 0;padding:10px;border:1px solid var(--line);border-radius:6px;background:var(--panel)}
  .review label{display:flex;gap:7px;align-items:center;cursor:pointer}
  .review input[type=text]{width:100%;margin:7px 0}
  .review button{cursor:pointer;background:var(--accent);color:#fff;border:none;border-radius:5px;padding:5px 12px}
  .exp{display:inline-block;width:12px;color:var(--dim);cursor:pointer;user-select:none}
  .exp:hover{color:var(--txt)} .exp.ph{cursor:default}
  .badge{background:#27406a;color:#9fdcff;border-radius:8px;padding:0 6px;font-weight:600}
  .prodkids{margin:2px 0 8px 24px;border-left:1px solid var(--line);padding-left:8px}
  .prod{display:flex;gap:10px;align-items:baseline;padding:3px 8px;border-radius:5px;cursor:pointer;border:1px solid transparent}
  .prod:hover{background:#1d2540} .prod.psel{background:#23304f;border-color:var(--accent)}
  .prod .pn{font-family:ui-monospace,Consolas,monospace;color:#bcd;min-width:104px}
  .prod .spec{color:var(--dim);font-size:11px}
  .ploading{color:var(--dim);font-style:italic;padding:4px 8px}
  .ty.ok{background:#274a2c;color:#bfe6c0}
  .issuebox{margin:10px 0;padding:10px;border:1px solid #5a3030;border-radius:6px;background:#241a1a;color:#ffd0d0}
  .issuebox .resol{margin-top:6px;color:#bfe6c0;border-top:1px solid #3a2a2a;padding-top:6px}
  .lct{border-collapse:collapse;margin:8px 0;font-size:12px}
  .lct th,.lct td{border:1px solid var(--line);padding:3px 10px;text-align:left}
  .lct th{color:var(--dim);font-weight:600} .lct td b{color:#9fdcff}
  .json{background:#0c1120;border:1px solid var(--line);border-radius:6px;padding:10px;margin:8px 0;
        font:12px/1.45 ui-monospace,Consolas,monospace;color:#cde;white-space:pre;overflow:auto;max-height:360px}
  .json .k{color:#9fdcff}
</style>
</head>
<body>
<header><h1>Taxonomy verifier</h1><span class="cap" id="count"></span>
  <span class="cap" style="margin-left:auto">click a section → its banner is highlighted on the source page</span></header>
<div class="grid">
  <div class="col left">
    <div class="filters"><input id="q" placeholder="search…" style="flex:1"></div>
    <div id="list"></div>
  </div>
  <div class="col" id="src"><p class="cap">Select a section to verify its source.</p></div>
</div>
<script>
let DATA=null,BYID={},collapsed={},expanded={},PRODS={},curId=null;const $=s=>document.querySelector(s);
const idOf=s=>s.catalog+"|"+s.section;
const OTHERCATS=[["product","Product (in Sections)"],["reference","Other → Reference"],["charts","Other → Charts"]];
const statusOptions=cur=>OTHERCATS.map(([v,l])=>`<option value="${v}" ${v===(cur||"product")?"selected":""}>${l}</option>`).join("");
const esc=t=>String(t==null?"":t).replace(/&/g,"&amp;").replace(/</g,"&lt;");
async function boot(){ await load(); $("#q").oninput=render; render(); }
async function load(){
  DATA=await (await fetch("/api/taxonomy")).json();
  BYID={}; DATA.groups.forEach(g=>g.types.forEach(t=>t.sections.forEach(s=>BYID[idOf(s)]=s)));
}
function matches(s,q){ return !q || s.section.toLowerCase().includes(q)||s.product_type.includes(q)||(s.brand||"").toLowerCase().includes(q); }
function render(){
  const q=$("#q").value.toLowerCase();
  $("#count").textContent=`${DATA.counts.products} product sections · ${DATA.counts.other} in Other · ${DATA.counts.issues||0} issues (${DATA.counts.issues_open||0} open) · ${DATA.counts.charts||0} load charts`;
  let html="";
  DATA.groups.forEach(g=>{
    const types=g.types.map(t=>({...t,sections:t.sections.filter(s=>matches(s,q))})).filter(t=>t.sections.length||(!q&&g.name==="Other"));
    if(!types.length) return;
    html+=`<div class="group">${g.name}</div>`;
    types.forEach(t=>{
      const ck="t_"+g.name+"_"+t.product_type, open=q||!collapsed[ck];
      html+=`<div class="type" data-ck="${ck}">${open?"▾":"▸"} ${t.product_type} <span class="ct">(${t.sections.length})</span></div>`;
      if(open){ html+=`<div class="kids">`+t.sections.map(s=>{
        const p=s.pages[0]===s.pages[1]?s.pages[0]:`${s.pages[0]}–${s.pages[1]}`;
        const note=isOther(s)&&s.review.note?` <span class="ty flag">${s.review.note}</span>`:"";
        const itag=s._issue?` <span class="ty ${s._issue.status==='resolved'?'ok':'flag'}">${s._issue.status||'open'}</span>`:s._loadchart?` <span class="ty flag">${(s._loadchart.status||'').replace('_',' ')}</span>`:"";
        const eid=idOf(s), has=s.n_products>0, pop=!!expanded[eid];
        const car=has?`<span class="exp" data-exp="${eid}">${pop?"▾":"▸"}</span> `:`<span class="exp ph"></span> `;
        const badge=has?` <span class="badge">${s.n_products}</span>`:"";
        return `<div class="item ${isOther(s)?'notprod':''}" data-id="${eid}">
          <div class="nm">${car}${s.section}${note}${itag}</div>
          <div class="pg">p${p}${badge} · ~${s.approx_skus}</div></div>`
          +(has&&pop?`<div class="prodkids">${renderProds(eid)}</div>`:"");
      }).join("")+`</div>`; }
    });
  });
  $("#list").innerHTML=html;
  document.querySelectorAll(".type").forEach(el=>el.onclick=()=>{collapsed[el.dataset.ck]=!collapsed[el.dataset.ck];render();});
  document.querySelectorAll(".item").forEach(el=>el.onclick=()=>sel(el.dataset.id));
  document.querySelectorAll(".exp[data-exp]").forEach(el=>el.onclick=e=>{e.stopPropagation();toggleProds(el.dataset.exp);});
  document.querySelectorAll(".prod").forEach(el=>el.onclick=e=>{e.stopPropagation();selProduct(el.dataset.eid,+el.dataset.i);});
}
function renderProds(eid){
  const list=PRODS[eid];
  if(!list) return `<div class="ploading">loading…</div>`;
  if(!list.length) return `<div class="ploading">no products</div>`;
  return list.map((p,i)=>{
    const ov=p.overlay_class||p.overlay_raw||"—";
    return `<div class="prod" data-eid="${eid}" data-i="${i}">
      <span class="pn">${p.part_number}</span>
      <span class="spec">${p.opening_angle_deg}° · ${ov} · ${p.fixing||"—"} · ${p.closing_type||"—"}</span></div>`;
  }).join("");
}
async function toggleProds(eid){
  expanded[eid]=!expanded[eid];
  if(expanded[eid] && !PRODS[eid]){
    render();                                  // show "loading…" immediately
    const s=BYID[eid];
    const u=`/api/products?catalog=${encodeURIComponent(s.catalog)}&section=${encodeURIComponent(s.section)}`;
    PRODS[eid]=(await (await fetch(u)).json()).products;
  }
  render();
}
function selProduct(eid,i){
  const p=PRODS[eid][i]; curId=null;
  document.querySelectorAll(".prod").forEach(e=>e.classList.toggle("psel",e.dataset.eid===eid&&+e.dataset.i===i));
  document.querySelectorAll(".item").forEach(e=>e.classList.remove("sel"));
  const src=DATA.sources[p._source]||{}, pl=(src.page_label||"p{n}").replace("{n}",p._page);
  const ov=p.overlay_class||p.overlay_raw||"—";
  let hl="";
  if(p._bbox){const[x0,y0,x1,y1]=p._bbox;
    hl=`<div class="hl" style="left:${x0*100}%;top:${y0*100}%;width:${(x1-x0)*100}%;height:${(y1-y0)*100}%"></div>`;}
  $("#src").innerHTML=`<div class="big">${p.part_number}</div>
    <div class="cap"><b>${p.brand} ${p.series||""}</b> · ${p.product_type} · ${src.label||p._source} · ${pl}</div>
    <div class="cap">opening ${p.opening_angle_deg}° · overlay ${ov} · fixing ${p.fixing||"—"} · ${p.closing_type||"—"} close</div>
    ${jsonBlock(p,"product node (products.json)")}
    <div class="cap">yellow box = this product's row on the page</div>
    <div class="stage"><img src="/page/${p._source}/${p._page}.png">${hl}</div>`;
}
function isOther(s){ return s.review&&s.review.status&&s.review.status!=="product"; }
function loadChartView(lc){
  const ax=lc.axes||{};
  const counts=(ax.hinge_counts||[]).join(" / ");
  const heights=ax.door_height_thresholds_mm?ax.door_height_thresholds_mm.map(h=>h+"mm").join(", ")
    :(ax.door_height_thresholds_in||[]).map(h=>h+'"').join(", ");
  const weights=ax.weight_bands_kg?ax.weight_bands_kg.map(b=>b[0]+"-"+b[1]+"kg").join(", ")
    :(ax.weight_axis_lb?ax.weight_axis_lb.map(w=>w+"lb").join(", "):"—");
  const rows=(lc.cells||[]).map(c=>{
    const w=c.weight_kg?`${c.weight_kg[0]}–${c.weight_kg[1]} kg`:(c.weight_lb?`${c.weight_lb[0]}–${c.weight_lb[1]} lb`:"any");
    const h=c.max_door_height_mm?`≤ ${c.max_door_height_mm} mm`:(c.max_door_height_in?`≤ ${c.max_door_height_in}"`:"—");
    return `<tr><td>${w}</td><td>${h}</td><td><b>${c.hinges}</b></td></tr>`;
  }).join("");
  return `<div class="issuebox"><b>⚠ ${esc((lc.status||'needs_verification').replace(/_/g,' ').toUpperCase())}</b>`
    +` — axes confirmed vs the page text; verify the cell mapping against the chart image below.</div>`
    +`<div class="cap"><b>${esc(lc.brand)} ${esc(lc.series)}</b> · ${esc(lc.units)} · hinge counts ${esc(counts)}</div>`
    +`<div class="cap">weight bands: ${esc(weights)}<br>door heights: ${esc(heights)}</div>`
    +`<table class="lct"><thead><tr><th>weight</th><th>max door height</th><th>hinges</th></tr></thead><tbody>${rows}</tbody></table>`
    +(lc.worked_example?`<div class="cap">worked example: ${esc(lc.worked_example)}</div>`:"")
    +(lc.note?`<div class="cap">${esc(lc.note)}</div>`:"");
}
function jsonBlock(obj,label){
  const js=JSON.stringify(obj,null,2).replace(/&/g,"&amp;").replace(/</g,"&lt;")
            .replace(/^(\s*)("[^"]+")(:)/gm,'$1<span class="k">$2</span>$3');
  return `<div class="cap">${label||"JSON node"}:</div><pre class="json">${js}</pre>`;
}
function sel(id){
  curId=id;
  document.querySelectorAll(".item").forEach(e=>e.classList.toggle("sel",e.dataset.id===id));
  document.querySelectorAll(".prod").forEach(e=>e.classList.remove("psel"));
  const s=BYID[id],src=DATA.sources[s.catalog]||{},pl=(src.page_label||"p{n}").replace("{n}",s.page),rv=s.review||{},it=s._issue,lc=s._loadchart;
  let hl="";
  if(s.bbox){const[x0,y0,x1,y1]=s.bbox;
    hl=`<div class="hl" style="left:${x0*100}%;top:${y0*100}%;width:${(x1-x0)*100}%;height:${(y1-y0)*100}%"></div>`;}
  const mid = lc ? loadChartView(lc)
    : it ? `<div class="issuebox"><b>⚠ ${(it.status||'open').toUpperCase()}</b> — ${esc(it.problem)}`
        +(it.resolution?`<div class="resol"><b>Resolution:</b> ${esc(it.resolution)}</div>`:'')+`</div>`
    : `<div class="review">
        <div>classify: <select id="rvstatus">${statusOptions(rv.status)}</select></div>
        <input type="text" id="rvnote" placeholder="note (optional, e.g. overlay chart)" value="${(rv.note||'').replace(/"/g,'&quot;')}">
        <button onclick="saveReview()">save</button>
      </div>`;
  const jlabel = lc?"load chart (load_charts.json)" : it?"issue (extraction_issues.json)":"section node (taxonomy.json)";
  const meta = lc?`load chart · ${src.label||s.catalog} · ${pl}` : `${it?'flagged for review':'auto type'} <b>${s.product_type}</b> · ${src.label||s.catalog} · ${pl}${it?'':' · ~'+s.approx_skus+' skus'}`;
  const imgcap = lc?'yellow box = the chart on the page' : it?'the flagged page:' : 'yellow box = the banner this section was identified from';
  $("#src").innerHTML=`<div class="big">${s.section}</div>
    <div class="cap">${meta}</div>
    ${mid}
    ${jsonBlock(s, jlabel)}
    <div class="cap">${imgcap}</div>
    <div class="stage"><img src="/page/${s.catalog}/${s.page}.png">${hl}</div>`;
}
async function saveReview(){
  const s=BYID[curId];
  await fetch("/api/review",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({catalog:s.catalog, section:s.section,
      status:$("#rvstatus").value, note:$("#rvnote").value})});
  await load(); render(); if(BYID[curId]) sel(curId);
}
boot();
</script>
</body>
</html>
